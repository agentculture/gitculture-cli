name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "gitculture/**"
      - "packaging/ghafi/**"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "gitculture/**"
      - "packaging/ghafi/**"

# Dual distribution: the canonical package is `gitculture-cli` (real code, in
# ./pyproject.toml). `ghafi` is a compatibility shim (./packaging/ghafi) that
# just depends on gitculture-cli. Both are published from this single repo via
# Trusted Publishing, so BOTH PyPI projects must have a trusted publisher
# registered for repo `agentculture/ghafi`, workflow `publish.yml`, and the
# matching environment (pypi / testpypi). The shim's version and its
# `gitculture-cli==` pin are re-stamped from the canonical version below, so
# the literals committed in packaging/ghafi/pyproject.toml never drift.

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - run: uv run pytest -n auto -v

  test-publish:
    # Skip on fork PRs — no OIDC/environment context is available there.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Set dev version and stamp shim
        run: |
          BASE=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DEV_VERSION="${BASE}.dev${{ github.run_number }}"
          # Canonical distribution version.
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          # Keep the ghafi shim in lockstep (own version + dependency pin).
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" packaging/ghafi/pyproject.toml
          sed -i "s/^dependencies = .*/dependencies = [\"gitculture-cli==${DEV_VERSION}\"]/" packaging/ghafi/pyproject.toml
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "Publishing ${DEV_VERSION} (gitculture-cli + ghafi) to TestPyPI"

      - name: Build both distributions
        run: |
          uv build --out-dir dist                      # gitculture-cli
          uv build packaging/ghafi --out-dir dist      # ghafi (shim)
          ls -la dist

      - name: Publish gitculture-cli to TestPyPI
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ \
            --trusted-publishing always --check-url https://test.pypi.org/simple/ \
            dist/gitculture_cli-*

      - name: Publish ghafi shim to TestPyPI
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ \
            --trusted-publishing always --check-url https://test.pypi.org/simple/ \
            dist/ghafi-*

      - name: Print install commands
        if: always()
        run: |
          echo "::notice::Test gitculture-cli with: uv tool install --index-url https://test.pypi.org/simple/ --index-strategy unsafe-best-match gitculture-cli==${DEV_VERSION}"
          echo "::notice::Test ghafi shim with: uv tool install --index-url https://test.pypi.org/simple/ --index-strategy unsafe-best-match ghafi==${DEV_VERSION}"

  publish:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Stamp shim version from canonical version
        run: |
          VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          sed -i "s/^version = .*/version = \"${VERSION}\"/" packaging/ghafi/pyproject.toml
          sed -i "s/^dependencies = .*/dependencies = [\"gitculture-cli==${VERSION}\"]/" packaging/ghafi/pyproject.toml
          echo "Publishing ${VERSION} (gitculture-cli + ghafi) to PyPI"

      - name: Build both distributions
        run: |
          uv build --out-dir dist                      # gitculture-cli
          uv build packaging/ghafi --out-dir dist      # ghafi (shim)
          ls -la dist

      - name: Publish gitculture-cli to PyPI
        run: |
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/ \
            dist/gitculture_cli-*

      - name: Publish ghafi shim to PyPI
        run: |
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/ \
            dist/ghafi-*
