name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "gitculture/**"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "gitculture/**"

# Dual distribution: the SAME code is published under two PyPI project names —
# `gitculture-cli` (canonical) and `ghafi` (kept for `pip install ghafi`
# backward-compat). Both are FULL distributions built from this one repo: each
# ships the `gitculture` package and the `gitculture` + `ghafi` console scripts,
# and each has zero runtime dependencies (stdlib only). The `ghafi` build is
# produced by overriding `[project].name` in pyproject.toml at build time — it is
# NOT a shim/metapackage. Because Trusted Publishing is keyed on the
# (repository, workflow, environment) triple, BOTH PyPI projects must have a
# trusted publisher registered for repo `agentculture/gitculture-cli`, workflow
# `publish.yml`, and the matching environment (pypi / testpypi).

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - run: uv run pytest -n auto -v

  test-publish:
    # Skip on fork PRs — no OIDC/environment context is available there.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Set dev version
        run: |
          BASE=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DEV_VERSION="${BASE}.dev${{ github.run_number }}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "Publishing ${DEV_VERSION} (gitculture-cli + ghafi) to TestPyPI"

      - name: Build both distributions (same code, two names)
        run: |
          uv build --out-dir dist                                   # gitculture-cli
          sed -i 's/^name = "gitculture-cli"$/name = "ghafi"/' pyproject.toml
          uv build --out-dir dist                                   # ghafi (full, no deps)
          ls -la dist

      - name: Publish gitculture-cli to TestPyPI
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ \
            --trusted-publishing always --check-url https://test.pypi.org/simple/ \
            dist/gitculture_cli-*

      - name: Publish ghafi to TestPyPI
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ \
            --trusted-publishing always --check-url https://test.pypi.org/simple/ \
            dist/ghafi-*

      - name: Print install commands
        if: always()
        run: |
          echo "::notice::Test gitculture-cli with: uv tool install --index-url https://test.pypi.org/simple/ --index-strategy unsafe-best-match gitculture-cli==${DEV_VERSION}"
          echo "::notice::Test ghafi with: uv tool install --index-url https://test.pypi.org/simple/ --index-strategy unsafe-best-match ghafi==${DEV_VERSION}"

  publish:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Build both distributions (same code, two names)
        run: |
          uv build --out-dir dist                                   # gitculture-cli
          sed -i 's/^name = "gitculture-cli"$/name = "ghafi"/' pyproject.toml
          uv build --out-dir dist                                   # ghafi (full, no deps)
          ls -la dist

      - name: Publish gitculture-cli to PyPI
        run: |
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/ \
            dist/gitculture_cli-*

      - name: Publish ghafi to PyPI
        run: |
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/ \
            dist/ghafi-*
